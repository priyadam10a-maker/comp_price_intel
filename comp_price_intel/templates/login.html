{% extends 'base.html' %}
{% load static %}

{% block title %}Login | TEKTIAS NETWORK{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="text-neon">Sign in</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">Sign in to your account</p>
        
        {% if error %}
            <div style="background-color: rgba(255,0,0,0.1); border-left: 4px solid red; padding: 15px; margin-bottom: 20px; border-radius: 5px;">
                {{ error }}
            </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
            
            <div class="auth-links">
                Don't have an account? <a href="{% url 'register' %}">Create one</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
