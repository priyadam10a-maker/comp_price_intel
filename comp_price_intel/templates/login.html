{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card">

            <div class="card-header">
                <h3>Login</h3>
            </div>

            <div class="card-body">

                {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="form-group">

                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="form-group">

                        <label>Password</label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
