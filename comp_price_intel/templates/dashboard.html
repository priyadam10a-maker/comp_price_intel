{% extends 'base.html' %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<h2 class="mb-4">
    Welcome {{ user_name }}
</h2>

<div class="row">

    <div class="col-md-4">

        <div class="card mb-3">

            <div class="card-body">

                <h5 class="card-title">
                    Product Search
                </h5>

                <p class="card-text">
                    Search products and compare competitor pricing.
                </p>

                <a
                    href="{% url 'search_product' %}"
                    class="btn btn-primary">

                    Open

                </a>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card mb-3">

            <div class="card-body">

                <h5 class="card-title">
                    Reports
                </h5>

                <p class="card-text">
                    View pricing reports and recommendations.
                </p>

                <button
                    class="btn btn-secondary"
                    disabled>

                    Coming Soon

                </button>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card mb-3">

            <div class="card-body">

                <h5 class="card-title">
                    Logout
                </h5>

                <p class="card-text">
                    Securely sign out.
                </p>

                <a
                    href="{% url 'logout' %}"
                    class="btn btn-danger">

                    Logout

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
