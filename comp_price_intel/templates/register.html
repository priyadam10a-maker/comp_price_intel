<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
</head>

<body>

<h2>User Registration</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="full_name"
        placeholder="Full Name"
        required
    >
    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >
    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >
    <br><br>

    <input
        type="password"
        name="password_confirm"
        placeholder="Confirm Password"
        required
    >
    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
